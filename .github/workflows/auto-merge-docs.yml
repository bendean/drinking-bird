name: Auto-merge docs PRs

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  auto-merge:
    if: startsWith(github.head_ref, 'claude/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify docs-only changes
        run: |
          FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          if echo "$FILES" | grep -qvE '^(docs/|TODO\.md$|IDEAS\.md$|NEXT-STEPS\.md$|CLAUDE\.md$)'; then
            echo "::error::Non-docs changes found, skipping auto-merge"
            exit 1
          fi

      - name: Auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge ${{ github.event.pull_request.number }} --squash --auto
